<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <title>Urna Eletrônica - Etec São Mateus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta Institucional CPS */
        :root {
            --cps-red: #B30000;
            --cps-dark: #212529;
            --cps-gray: #f4f6f9;
            --cps-light-gray: #e9ecef;
            --white: #ffffff;
            --success: #198754;
            --error: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--cps-gray);
            color: var(--cps-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--cps-red);
            color: var(--white);
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-branding {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-etec {
            height: 45px;
            width: auto;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .header-title span {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.9;
        }

        main {
            flex: 1;
            max-width: 700px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
        }

        .urna-card {
            background: var(--white);
            border-top: 5px solid var(--cps-red);
            border-radius: 8px;
            padding: 40px 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .urna-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--cps-light-gray);
            padding-bottom: 20px;
        }

        .urna-header h2 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--cps-dark);
        }

        .urna-header p {
            color: #6c757d;
            margin-top: 5px;
        }

        .chapas-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .chapa-label {
            display: flex;
            align-items: center;
            padding: 20px;
            border: 2px solid var(--cps-light-gray);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--white);
            position: relative;
        }

        .chapa-label:hover {
            border-color: var(--cps-red);
            background: #fffafa;
        }

        .chapa-label.selecionada {
            border-color: var(--success);
            background-color: #f0fdf4;
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.15);
        }

        .chapa-label input[type="radio"] {
            display: none;
        }

        .chapa-numero-badge {
            background-color: var(--cps-dark);
            color: var(--white);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 900;
            margin-right: 20px;
        }

        .chapa-label.selecionada .chapa-numero-badge {
            background-color: var(--success);
        }

        .chapa-info h3 {
            font-size: 1.3rem;
            color: var(--cps-dark);
        }

        .check-icon {
            display: none;
            position: absolute;
            right: 20px;
            color: var(--success);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .chapa-label.selecionada .check-icon {
            display: block;
        }

        .btn-confirmar {
            width: 100%;
            background-color: var(--success);
            color: var(--white);
            border: none;
            padding: 20px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(25, 135, 84, 0.3);
        }

        .btn-confirmar:hover:not(:disabled) {
            background-color: #146c43;
            transform: translateY(-2px);
        }

        .btn-confirmar:disabled {
            background-color: #a5d8b6;
            cursor: not-allowed;
        }

        .alert-box {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
            display: none;
        }

        .alert-error { background-color: #f8d7da; color: var(--error); border: 1px solid #f5c2c7; }
        .alert-success { background-color: #d1e7dd; color: var(--success); border: 1px solid #badbcc; }

        .voto-registrado-box {
            background-color: #f8f9fa;
            border: 2px solid var(--success);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            display: none;
        }

        .voto-registrado-box h3 { color: var(--success); font-size: 1.5rem; margin-bottom: 15px; }
        .btn-voltar-home {
            display: inline-block;
            margin-top: 20px;
            background-color: var(--cps-dark);
            color: var(--white);
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 700;
        }

        .loading-text { text-align: center; color: #6c757d; font-style: italic; padding: 20px; }

        footer {
            background-color: var(--cps-dark);
            color: var(--white);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-branding">
                <img src="img/logo.png" alt="Logo Etec" class="logo-etec">
                <div class="header-title">
                    <h1>ETEC SÃO MATEUS</h1>
                    <span>Centro Paula Souza</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="urna-card">
            
            <div id="voto-registrado-container" class="voto-registrado-box"></div>

            <div id="area-votacao">
                <div class="urna-header">
                    <h2>Cédula de Votação</h2>
                    <p>Escolha a chapa desejada e confirme o seu voto.</p>
                </div>

                <div id="mensagem-alerta" class="alert-box"></div>

                <form id="form-votacao">
                    <div id="lista-chapas" class="chapas-container">
                        <div class="loading-text">Carregando opções de voto...</div>
                    </div>
                    <button type="submit" id="btn-confirmar" class="btn-confirmar" disabled>CONFIRMAR VOTO</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Etec São Mateus. Sistema de Votação Eletrônica.</p>
    </footer>
