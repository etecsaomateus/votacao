<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <title>Acesso à Urna - Etec São Mateus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Mesma Paleta de Cores Padrão CPS / Etec */
        :root {
            --cps-red: #B30000;
            --cps-dark: #212529;
            --cps-gray: #f4f6f9;
            --cps-light-gray: #e9ecef;
            --white: #ffffff;
            --success: #198754;
            --error: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--cps-gray);
            color: var(--cps-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Cabeçalho Institucional */
        header {
            background-color: var(--cps-red);
            color: var(--white);
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .header-title span {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Container de Login */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            border-top: 5px solid var(--cps-red);
            border-radius: 8px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--cps-dark);
        }

        .login-card p {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* Formulário */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--cps-dark);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
            background-color: var(--cps-gray);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--cps-red);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(179, 0, 0, 0.1);
        }

        .btn-submit {
            display: block;
            width: 100%;
            background-color: var(--success);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #146c43;
        }

        .btn-submit:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        /* Mensagem de Erro */
        .error-message {
            color: var(--error);
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            display: none; /* Escondido por padrão */
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 25px;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            transition: color 0.2s;
        }

        .btn-voltar:hover {
            color: var(--cps-red);
        }

        /* Rodapé */
        footer {
            background-color: var(--cps-dark);
            color: var(--white);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title">
                <h1>ETEC SÃO MATEUS</h1>
                <span>Centro Paula Souza</span>
            </div>
        </div>
    </header>

    <main>
        <div class="login-card">
            <h2>Acesso à Urna</h2>
            <p>Identifique-se para registrar o seu voto.</p>

            <div id="error-alert" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="rm">Seu RM (5 dígitos)</label>
                    <input type="text" id="rm" class="form-control" placeholder="Ex: 23472" maxlength="5" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="data-nascimento">Data de Nascimento</label>
                    <input type="date" id="data-nascimento" class="form-control" required>
                </div>

                <button type="submit" id="btn-login" class="btn-submit">Entrar e Votar</button>
            </form>

            <a href="index.html" class="btn-voltar">← Voltar para a parcial de votos</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Etec São Mateus. Sistema de Votação Eletrônica.</p>
    </footer>
