<!DOCTYPE html>
<html lang="pt-BR">
<!-- dev by Julio M. & Danilo H. -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleições Grêmio - Etec São Mateus</title>
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --cps-red: #B30000;
            --cps-dark: #212529;
            --cps-gray: #f4f6f9;
            --cps-light-gray: #e9ecef;
            --white: #ffffff;
            --success: #198754;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--cps-gray);
            color: var(--cps-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--cps-red);
            color: var(--white);
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-branding {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-etec {
            height: 55px; 
            width: auto;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .header-title span {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.9;
            display: block;
        }

        main {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
        }

        .painel-apuracao {
            background: var(--white);
            border-top: 5px solid var(--cps-red);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #ffeaea;
            color: var(--cps-red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--cps-red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(179, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(179, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(179, 0, 0, 0); }
        }

        .total-votos {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--cps-dark);
            line-height: 1;
            margin-bottom: 5px;
        }

        .total-label {
            font-size: 1rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .chapas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chapa-card {
            background: var(--white);
            border: 1px solid var(--cps-light-gray);
            border-radius: 8px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .chapa-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08);
            border-color: var(--cps-red);
        }

        .chapa-numero {
            background-color: var(--cps-dark);
            color: var(--white);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .chapa-nome {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--cps-dark);
        }

        .chapa-integrantes {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 20px;
            line-height: 1.4;
            min-height: 38px;
        }

        .chapa-votos-parcial {
            font-size: 2rem;
            font-weight: 900;
            color: var(--cps-red);
            margin-top: auto;
        }

        .chapa-votos-label {
            font-size: 0.85rem;
            color: #6c757d;
            text-transform: uppercase;
        }

        /* Container do Gráfico: Menor e centralizado */
        .grafico-container {
            background: var(--white);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin: 0 auto 40px auto; /* Centraliza e dá margem embaixo */
            position: relative;
            height: 250px; /* Altura reduzida */
            max-width: 700px; /* Largura máxima para não esticar demais */
            width: 100%;
            display: none; /* Escondido até carregar os dados */
        }

        .cta-container {
            text-align: center;
            margin-top: 20px;
        }

        .btn-votar {
            display: inline-block;
            background-color: black;
            color: white !important;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(25, 135, 84, 0.3);
        }

        .btn-votar:hover {
            background-color: red;
            transform: translateY(-2px);
        }

        footer {
            background-color: var(--cps-dark);
            color: var(--white);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            margin-top: auto;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <div class="header-branding">
                <img src="img/logo.png" alt="Logo Etec" class="logo-etec">
                <div class="header-title">
                    <h1>ETEC SÃO MATEUS</h1>
                    <span>Centro Paula Souza - Governo do Estado</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="painel-apuracao">
            <div class="live-indicator">
                <div class="dot"></div> Tempo Real
            </div>
            <h2>Eleições do Grêmio Estudantil</h2>
            <br>
            <div id="total-apurado" class="total-votos">0</div>
            <div class="total-label">Votos Totais Apurados</div>
        </div>

        <div id="lista-parciais" class="chapas-grid">
            <div class="loading">Conectando às urnas virtuais...</div>
        </div>

        <div id="box-grafico" class="grafico-container">
            <canvas id="graficoVotos"></canvas>
        </div>

        <div class="cta-container">
            <a href="login.html" class="btn-votar">Acessar a Urna e Votar</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ETEC SÃO MATEUS. Sistema de Votação Eletrônica. - By Julio M. & Danilo H.</p>
    </footer>
